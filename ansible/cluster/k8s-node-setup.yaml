- name: Prepare Kubernetes Nodes
  hosts: all
  become: true
  tasks:
    - name: Build hosts file
      lineinfile:
        path: /etc/hosts
        line: "{{ hostvars[item]['ansible_default_ipv4']['address'] | default(item) }} {{ item }}"
        state: present
      loop: "{{ groups['all'] }}"

    - name: Force DNS to Google
      become: true
      ansible.builtin.shell: |
        echo "nameserver 8.8.8.8" > /etc/resolv.conf
        echo "nameserver 1.1.1.1" >> /etc/resolv.conf

    - name: Disable SELinux
      selinux:
        state: disabled

    - name: Stop and Disable Firewalld
      service:
        name: firewalld
        state: stopped
        enabled: no
      ignore_errors: yes

    - name: Disable SWAP
      shell: |
        swapoff -a
        sed -i '/swap/d' /etc/fstab

    - name: Load Kernel Modules
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter

    - name: Apply Kernel Modules
      shell: |
        modprobe overlay
        modprobe br_netfilter

    - name: Set Sysctl parameters
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1

    - name: Reload Sysctl
      command: sysctl --system

    - name: Add Docker-ce Repo (for containerd)
      get_url:
        url: https://download.docker.com/linux/centos/docker-ce.repo
        dest: /etc/yum.repos.d/docker-ce.repo

    - name: Install Containerd
      dnf:
        name: containerd.io
        state: present

    - name: Configure Containerd
      shell: |
        mkdir -p /etc/containerd
        containerd config default > /etc/containerd/config.toml
        sed -i 's/SystemdCgroup = false/SystemdCgroup = true/g' /etc/containerd/config.toml
      notify: restart containerd

    - name: Add Kubernetes Repo
      copy:
        dest: /etc/yum.repos.d/kubernetes.repo
        content: |
          [kubernetes]
          name=Kubernetes
          baseurl=https://pkgs.k8s.io/core:/stable:/v1.30/rpm/
          enabled=1
          gpgcheck=1
          gpgkey=https://pkgs.k8s.io/core:/stable:/v1.30/rpm/repodata/repomd.xml.key

    - name: Install K8s Tools
      dnf:
        name: [kubelet, kubeadm, kubectl]
        state: present
        disable_excludes: kubernetes

    - name: Enable and Start Kubelet/Containerd
      service:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop: [containerd, kubelet]

  handlers:
    - name: restart containerd
      service:
        name: containerd
        state: restarted
