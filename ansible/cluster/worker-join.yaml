- name: Extract Join Command from Master
  hosts: master
  become: true
  tasks:
    - name: Generate join command
      ansible.builtin.command: kubeadm token create --print-join-command
      register: master_join_command

    - name: Set join command as a fact
      ansible.builtin.set_fact:
        join_cmd: "{{ master_join_command.stdout }}"

- name: Join Workers to Cluster
  hosts: workers
  become: true
  tasks:
    - name: Check if node is already joined
      ansible.builtin.stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    - name: Run join command
      ansible.builtin.command: "{{ hostvars[groups['master'][0]]['join_cmd'] }}"
      when: not kubelet_conf.stat.exists
      register: worker_join_result
